services:
  mongo:
    image: mongo
    restart: always
    env_file: stack.env
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-data:/data/db

  fastapi-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    env_file: stack.env

